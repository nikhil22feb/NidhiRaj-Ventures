{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>NidhiRaj Ventures</title>

    <!-- Favicon -->
    <link rel="icon" href="{% static 'images/logo.png' %}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f1f3f6; }
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: #2874f0;
        }

        .navbar input {
            border-radius: 4px;
        }

        .navbar .btn-light {
            font-weight: 500;
        }
        .navbar-brand img {
            border-radius: 5px;
        }

        .product-card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .product-card:hover {
            transform: scale(1.05);
            box-shadow: 0px 0px 10px #ccc;
        }

        .product-img {
            height: 180px;
            object-fit: contain;
        }

        .carousel img {
            height: 300px;
            object-fit: cover;
        }
    </style>
    
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-3">

    <!-- 🔵 LOGO -->
    <a class="navbar-brand d-flex align-items-center" href="/">
        <img src="{% static 'images/logo.png' %}" height="40" class="me-2">
        <span class="fw-bold text-white" style="white-space: nowrap;">
            NidhiRaj Ventures
        </span>
    </a>

    <!-- 🔍 SEARCH BAR -->
    <form class="d-flex mx-auto w-50" method="GET" action="/">
        <input class="form-control me-2" type="search" name="search" placeholder="Search for products, brands and more">
        <button class="btn btn-light">Search</button>
    </form>

    <!-- 🛒 RIGHT SIDE -->
    <div class="d-flex align-items-center">

        <!-- CART -->
        <a href="/cart/" class="btn btn-light me-2">
            🛒 Cart
        </a>

        <!-- ORDERS -->
        <a href="/my-orders/" class="btn btn-light me-2">
            📦 Orders
        </a>

        <!-- LOGIN / USER -->
        {% if user.is_authenticated %}
            <div class="dropdown">
                <button class="btn btn-light dropdown-toggle" data-bs-toggle="dropdown">
                    👤 {{ user.username }}
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="/my-orders/">My Orders</a></li>
                    <li><a class="dropdown-item" href="/logout/">Logout</a></li>
                </ul>
            </div>
        {% else %}
            <a href="/login/" class="btn btn-warning">
                Login
            </a>
        {% endif %}

    </div>

</nav>

<!-- 🟡 CATEGORY BAR -->
<div class="bg-white shadow-sm py-2 text-center">
    {% for c in categories %}
        <a href="/?category={{c.id}}" class="mx-3 text-dark fw-semibold">
            {{ c.name }}
        </a>
    {% endfor %}
</div>

<!-- 🔥 THIS IS IMPORTANT -->
{% block content %}{% endblock %}

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
