{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login - NidhiRaj Ventures</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #2874f0, #6fb1fc);
            height: 100vh;
        }
        
        .login-navbar {
            background: linear-gradient(90deg, #0f172a, #1e3a8a);   /* dark premium color */
            height: 70px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .login-card {
            width: 400px;
            margin: auto;
            margin-top: 100px;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>


<body>

{% load static %}

<!-- 🔵 LOGIN NAVBAR -->
<nav class="login-navbar d-flex align-items-center px-4">

    <img src="{% static 'images/logo.png' %}" height="40" class="me-2">

    <h4 class="text-white mb-0">NidhiRaj Ventures</h4>

</nav>

<div class="login-card">

    <div class="logo">
        <img src="{% static 'images/logo.png' %}" height="50"><br>
        <strong>NidhiRaj Ventures</strong>
    </div>

    <h4 class="text-center mb-3">Login</h4>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

        <!-- CAPTCHA -->
        <div class="mb-3">
            {{ form.captcha }}
        </div>

        <!-- 🔐 FORGOT PASSWORD -->
        <div class="text-end mb-3">
            <a href="/password-reset/" style="font-size: 14px; color: #2874f0;">
                Forgot Password?
            </a>
        </div>

        <button class="btn btn-primary w-100">Login</button>
        
        <div class="text-end mb-3">
            <a href="/accounts/google/login/" class="btn btn-danger w-100 mt-2">
                Continue with Google
            </a>
        </div>

        <p class="text-center mt-3">
            New user? 
            <a href="{% url 'signup' %}" style="color:#2874f0; font-weight:500;">
                Create New Account
            </a>
        </p>
        
    </form>

</div>

</body>
</html>
