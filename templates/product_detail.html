{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <div class="row">

        <div class="col-md-5">
            <img src="{{ product.image.url }}" class="w-100">
        </div>

        <div class="col-md-7">
            <h3>{{ product.name }}</h3>

            <h4 class="text-success">₹{{ product.price }}</h4>

            <p>High quality kitchen & bathroom product</p>

            <a href="/add-to-cart/{{product.id}}/" class="btn btn-warning">
                Add to Cart
            </a>

            <a href="/wishlist/add/{{product.id}}/" class="btn btn-danger">
                ❤️ Wishlist
            </a>
        </div>

    </div>
</div>

{% endblock %}
