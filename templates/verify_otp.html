<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 text-center">

    <h3>Verify OTP</h3>

    <form method="POST" action="/verify-otp/">
        {% csrf_token %}
        <input type="text" name="otp" placeholder="Enter OTP" class="form-control w-25 mx-auto mt-3">
        <button class="btn btn-primary mt-3">Verify</button>
    </form>

    <!-- 🔁 RESEND BUTTON -->
    <button id="resendBtn" class="btn btn-secondary mt-3" disabled>
        Resend OTP in <span id="timer">30</span>s
    </button>

</div>

<!-- ⏱ TIMER SCRIPT -->
<script>
let time = 30;
let btn = document.getElementById("resendBtn");
let timerText = document.getElementById("timer");

let interval = setInterval(() => {
    time--;
    timerText.innerText = time;

    if (time <= 0) {
        clearInterval(interval);
        btn.disabled = false;
        btn.innerText = "Resend OTP";
        btn.classList.remove("btn-secondary");
        btn.classList.add("btn-success");
    }
}, 1000);

// 🔁 RESEND ACTION
btn.onclick = function() {
    window.location.href = "/resend-otp/";
}
</script>

</body>
</html>
