{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - NidhiRaj Ventures</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #2874f0, #6fb1fc);
        }

        .login-navbar {
            background: #0f172a;
            height: 70px;
        }

        .reset-card {
            width: 400px;
            margin: auto;
            margin-top: 100px;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- 🔵 NAVBAR -->
<nav class="login-navbar d-flex align-items-center px-4">
    <img src="{% static 'images/logo.png' %}" height="40" class="me-2">
    <h4 class="text-white">NidhiRaj Ventures</h4>
</nav>

<!-- 🔐 RESET FORM -->
<div class="reset-card">

    <h4 class="text-center mb-3">Reset Password</h4>

    <p class="text-muted text-center">
        Enter your email to receive reset link
    </p>

    <form method="POST">
        {% csrf_token %}

        <input type="email" name="email" class="form-control mb-3" placeholder="Enter your email" required>

        <button class="btn btn-primary w-100">
            Send Reset Link
        </button>

    </form>

    <p class="text-center mt-3">
        <a href="/login/">Back to Login</a>
    </p>

</div>

</body>
</html>
