
{% extends 'base.html' %}
{% block content %}
<h4>Sales Dashboard</h4>
<canvas id="chart"></canvas>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
        labels: {{ labels|safe }},
        datasets: [{ label: 'Revenue', data: {{ data|safe }} }]
    }
});
</script>
{% endblock %}
