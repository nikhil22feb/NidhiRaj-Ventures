{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Signup - NidhiRaj Ventures</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #2874f0, #6fb1fc);
        }

        .login-navbar {
            background: #0f172a;
            height: 70px;
        }

        .signup-card {
            width: 400px;
            margin: auto;
            margin-top: 100px;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="login-navbar d-flex align-items-center px-4">
    <img src="{% static 'images/logo.png' %}" height="40" class="me-2">
    <h4 class="text-white">NidhiRaj Ventures</h4>
</nav>

<div class="signup-card">

    <h4 class="text-center mb-3">Create Account</h4>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" class="form-control mb-2" placeholder="Username" required>
        <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
        <input type="password" name="password" class="form-control mb-2" placeholder="Password" required>

        <button class="btn btn-success w-100">Signup</button>
    </form>

    <p class="text-center mt-2">
        Already have an account? <a href="/login/">Login</a>
    </p>

</div>


</body>
</html>
